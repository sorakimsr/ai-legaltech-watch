name = "daibfy-ai-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

# v2.7.1: Smart Placement 비활성화
# Smart Placement가 HKG 같은 차단 데이터센터로 worker를 옮겨 Anthropic 403 발생.
# 기본값(사용자 edge에서 실행)으로 두면 KR 사용자는 ICN colo에서 실행됨 → Anthropic 허용.
# OpenAI HKG 차단은 worker.js의 retry 로직으로 보완.
# [placement]
# mode = "smart"

# KV namespace for rate limiting (필수 — v6.0)
#   미설정 시 worker가 503으로 fail-secure (서버 키 무방비 노출 방지)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "aa25ac8adbbe4c739fb287e81a0756d9"

# Secrets는 dashboard 또는 `wrangler secret put` 로 등록
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put ALLOWED_ORIGINS   (선택)

# 커스텀 도메인 (선택)
# [routes]
# pattern = "api.daibfy.com/*"
# zone_name = "daibfy.com"
