name: Deploy Pages (on push)

# 정적 파일(HTML/CSS/JS) commit 시 GitHub Pages 즉시 배포.
# 데이터 수집은 별도 daily-update.yml 에서 cron으로 처리.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "404.html"
      - "app.js"
      - "app.util.js"      # v6.15.32: 누락돼 있어 이 파일만 수정 시 자동 배포 안 되던 버그 수정
      - "styles.css"
      - "assets/**"        # v6.15.32: 로고·아이콘 등 정적 자산 변경도 배포 트리거
      - "data/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # v6.15.42: 404.html은 SPA deep URL(/papers·/graph 등) 폴백 — 항상 index.html과 동일해야 함.
      #   index.html만 고치고 404.html을 안 맞추면 deep URL이 옛 화면으로 떨어지던 버그 방지.
      - name: Sync 404.html (SPA fallback = index.html)
        run: cp index.html 404.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
