name: Daily News Update

# v6.15.27 (2026-05-29): cron skip 안정성 보강.
#   사용자 지적: 5/29 01:17 KST schedule이 아예 트리거 안 됨.
#   원인: UTC 16:17 = EST 11:17 AM (high-load peak) → GitHub Actions가 schedule drop.
#   해결:
#     ① 4회 → 8회로 늘림 (skip 보험, public repo라 GitHub Actions cost 무관)
#     ② 37분 offset (정시·30분 회피)
#     ③ concurrency 설정 — 진행 중 빌드 끝까지, 새 trigger는 큐 대기
#   v6.15.11 (4회 + 17분 offset)에서 변경. v6.9 (정시 cron)에서도 변경.
on:
  schedule:
    # 8회 / 3시간 간격 / 37분 offset
    # UTC 00:37 / 03:37 / 06:37 / 09:37 / 12:37 / 15:37 / 18:37 / 21:37
    # KST 09:37 / 12:37 / 15:37 / 18:37 / 21:37 / 00:37 / 03:37 / 06:37
    - cron: "37 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      skip_fetch:
        description: "1단계 fetch 건너뛰기 (기존 raw_news.json 재사용 — 빠른 재처리용)"
        required: false
        default: "false"
      skip_enrich:
        description: "3단계 LLM enrichment 건너뛰기 (API 비용 절약)"
        required: false
        default: "false"
      skip_strategy:
        description: "4단계 전략 카드 생성 건너뛰기"
        required: false
        default: "false"
      deploy_only:
        description: "데이터 갱신 없이 GitHub Pages만 재배포 (UI 변경 후 빠른 배포)"
        required: false
        default: "false"
      refresh_recent_days:
        description: "최근 N일 이내 항목 enrich 재실행 (캐시 무시) — 프롬프트 정책 변경 후 새 음영/시사점 적용용"
        required: false
        default: "0"
      strategy_force_refresh:
        description: "weekly/monthly 시사점 카드 강제 재생성 (이미 존재해도 새 프롬프트로) — 음영 정책 변경 후"
        required: false
        default: "false"
      papers_force_refresh:
        description: "monthly 논문 흐름 강제 재생성 (이미 존재해도 새 프롬프트로) — 음영/단락 정책 변경 후"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

# v6.15.27 (2026-05-29): concurrency group 명확화 + schedule 보호.
#   기존 'pages' group은 모호 — GitHub Pages reserved group과 혼동.
#   'daily-update'로 명확화. cancel-in-progress=false 유지 → schedule이
#   dispatch 진행 중일 때 자동 cancel되지 않고 큐 대기.
concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    # v3.0: enrich 500건 + strategy(daily/weekly/monthly) + papers + deploy 합치면 30분 부족.
    # 빌드 #17이 [428/483] enrich 중에 cancelled됨. 90분으로 상향.
    # v6.15.1 (2026-05-27): refresh_recent_days=14 + 800 enrich cap에서 빌드 3건 연속
    # 90분 timeout 도달로 cancelled. 90→180으로 안전 마진 확보. 동시에
    # ENRICH_MAX_PER_RUN을 800→400으로 축소하여 통상 빌드 60-90분 수렴 (아래 env 참조).
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # 중간 단계 JSON (raw/deduped/enriched) 을 캐시로 보존
      # → LLM enrich 결과를 매 빌드마다 재사용 (비용 절약)
      - name: Cache intermediate data
        uses: actions/cache@v4
        with:
          path: |
            data/raw_news.json
            data/deduped_news.json
            data/enriched_news.json
          key: intermediate-data-${{ github.run_id }}
          restore-keys: |
            intermediate-data-

      - name: Install Python dependencies
        if: github.event.inputs.deploy_only != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # v2.7.3: Claude Code CLI 설치 제거 — Anthropic SDK 사용 (CLI 불필요, 30~60s 절약)

      # ===== 1단계: 뉴스 수집 =====
      - name: "Step 1/4 — Fetch news"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_fetch != 'true'
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: "eternalpassionfor@gmail.com"
        run: python scripts/fetch_news.py

      # ===== 2단계: 유사 뉴스 병합 =====
      - name: "Step 2/4 — Dedupe similar news"
        if: github.event.inputs.deploy_only != 'true'
        run: python scripts/dedupe_similar.py

      # ===== 3단계: LLM 한국어 요약·개별 시사점 =====
      - name: "Step 3/4 — Enrich with LLM (Korean summary & insight)"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_enrich != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
          ENRICH_TOP_N: "500"
          ENRICH_MAX_PER_RUN: "400"            # v6.15.1: 800→400 (timeout 안전. 못 다한 backlog는 cron 6h마다 캐시 hit으로 자동 이어 처리)
          # v6.14: 한국어 insight 임계값 70→35 (cut-off와 동일). 사용자 정책:
          #   "최대한 많은 데이터 + 모든 항목에 시사점 반영".
          #   기존 70은 한국어 기사 대부분 누락. cut-off (35) 통과한 모든 항목에 insight 생성.
          INSIGHT_THRESHOLD_KO: "35"
          ENRICH_REFRESH_DAYS: ${{ github.event.inputs.refresh_recent_days || '0' }}
        run: python scripts/enrich_with_llm.py
        continue-on-error: true

      - name: "Step 3/4 (skipped) — Copy deduped to enriched"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_enrich == 'true'
        run: cp data/deduped_news.json data/enriched_news.json

      # ===== 4·4b 병렬 — Strategy / Papers (둘 다 enriched_news.json 소비, 독립) =====
      - name: "Step 4/4 — Generate strategy cards & paper trends (parallel)"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_strategy != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: "claude-sonnet-4-6"
          # v3.2: weekly/monthly 강제 재생성 옵션 (workflow_dispatch input → '1' 또는 '0')
          STRATEGY_FORCE_REFRESH: ${{ github.event.inputs.strategy_force_refresh == 'true' && '1' || '0' }}
          # v3.12: papers monthly 강제 재생성 옵션 (true → 'true' 그대로 전달)
          PAPERS_FORCE_REFRESH: ${{ github.event.inputs.papers_force_refresh == 'true' && 'true' || 'false' }}
        run: |
          # 두 스크립트를 백그라운드로 동시 실행 → 약 50% 시간 단축
          python scripts/generate_strategy.py 2>&1 | sed 's/^/[strategy] /' &
          STRAT_PID=$!
          python scripts/analyze_papers.py 2>&1 | sed 's/^/[papers] /' &
          PAPERS_PID=$!
          # 둘 다 끝날 때까지 대기 (실패해도 다른 쪽은 진행)
          wait $STRAT_PID || echo "[strategy] failed (continuing)"
          wait $PAPERS_PID || echo "[papers] failed (continuing)"
        continue-on-error: true

      - name: "Step 4/4 (skipped) — Copy enriched to news.json"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_strategy == 'true'
        run: |
          python -c "
          import json, os
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          with open('data/enriched_news.json') as f:
              d = json.load(f)
          d['last_updated'] = datetime.now(KST).isoformat()
          d.setdefault('strategy', [])
          with open('data/news.json', 'w', encoding='utf-8') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          "

      # ===== Phase 2a: 엔티티 휴리스틱 추출 (LLM 없이, ~10초) =====
      - name: "Step 4c — Extract entities (heuristic)"
        if: github.event.inputs.deploy_only != 'true'
        run: python scripts/entity_extractor.py
        continue-on-error: true

      # ===== Phase 3: LLM 관계 추출 (Haiku, trend 카드 → triple) =====
      # entities.json이 있어야 동작 → Step 4c 뒤에 위치
      # daily 최근 7일 + weekly 4주 + monthly 3개월 카드만 처리 (비용 절약)
      - name: "Step 4d — Extract relations (LLM, Haiku)"
        if: github.event.inputs.deploy_only != 'true' && github.event.inputs.skip_enrich != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
        run: python scripts/relation_extractor.py
        continue-on-error: true

      # v6.2 (2026-05-26): 기존 v6.0 build stats step 제거 — workflow_dispatch 500 에러 원인 후보.
      #   heredoc(python - <<'PY' ... PY) 패턴이 GitHub Actions parser와 충돌 가능성.
      #   필요 시 별도 scripts/build_stats.py 로 분리해서 다시 추가할 수 있음.

      # ===== 5단계: Obsidian Vault로 마크다운 export =====
      - name: "Step 5 — Clone vault repo"
        if: github.event.inputs.deploy_only != 'true' && env.VAULT_PAT != ''
        env:
          VAULT_PAT: ${{ secrets.VAULT_PAT }}
          VAULT_REPO: ${{ secrets.VAULT_REPO }}
        run: |
          if [ -z "$VAULT_REPO" ]; then
            VAULT_REPO="${{ github.repository_owner }}/daibfy-vault"
          fi
          git clone "https://x-access-token:${VAULT_PAT}@github.com/${VAULT_REPO}.git" _vault_local || \
            mkdir -p _vault_local

      - name: "Step 5 — Export markdown to vault"
        if: env.VAULT_PAT != ''
        env:
          VAULT_PAT: ${{ secrets.VAULT_PAT }}
          VAULT_DIR: ${{ github.workspace }}/_vault_local
        run: python scripts/export_to_vault.py

      - name: "Step 5 — Push to vault repo"
        if: env.VAULT_PAT != ''
        env:
          VAULT_PAT: ${{ secrets.VAULT_PAT }}
          VAULT_REPO: ${{ secrets.VAULT_REPO }}
        run: |
          if [ -z "$VAULT_REPO" ]; then
            VAULT_REPO="${{ github.repository_owner }}/daibfy-vault"
          fi
          cd _vault_local
          git init -q 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${VAULT_PAT}@github.com/${VAULT_REPO}.git"
          git add -A
          if ! git diff --staged --quiet 2>/dev/null && [ "$(git rev-parse --verify HEAD 2>/dev/null || echo none)" != "none" ]; then
            git commit -m "vault update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:main || git push -u origin HEAD:main
          elif [ "$(git rev-parse --verify HEAD 2>/dev/null || echo none)" = "none" ]; then
            git commit -m "initial vault commit $(date -u +'%Y-%m-%d %H:%M UTC')"
            git branch -M main
            git push -u origin main
          else
            echo "No vault changes to push."
          fi

      # ===== Git Commit (메인 repo) — v6.15.4: robust race-condition 처리 =====
      # 빌드 결과를 임시 stash → remote 최신으로 reset → data/ 만 다시 적용 → commit + push.
      # 이 방식은 git rebase/merge 충돌 자체를 피한다 (data/ 파일은 항상 우리 빌드 결과가 최신).
      - name: Commit updated data
        if: github.event.inputs.deploy_only != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # pull 기본 전략을 rebase로 명시 (git 2.27+ 호환)
          git config pull.rebase true

          # 변경 사항 없으면 종료
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          COMMIT_MSG="chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "$COMMIT_MSG"
          OUR_COMMIT=$(git rev-parse HEAD)
          echo "Our commit: $OUR_COMMIT"

          # 최대 6회 재시도. 매 시도마다:
          #   1) 단순 push 시도
          #   2) 실패 시 → fetch + reset + checkout (data/ 만 우리 결과로 덮어쓰기) + 재 commit
          for attempt in 1 2 3 4 5 6; do
            if git push origin HEAD:main 2>/tmp/push_err; then
              echo "✅ Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "⚠️ Push attempt $attempt failed:"
            cat /tmp/push_err
            echo "→ Reconciling: fetch + reset + checkout data/ from our commit"

            # remote 최신 상태 가져오기
            git fetch origin main
            # remote main으로 hard reset (working tree 깨끗)
            git reset --hard origin/main
            # 우리 commit의 data/ 변경분만 다시 적용 (이게 핵심 — 충돌 없이 강제 ours)
            git checkout "$OUR_COMMIT" -- data/
            git add data/
            if git diff --staged --quiet; then
              echo "  data/ unchanged after reconcile — remote already has our changes?"
              echo "  exiting success (idempotent)"
              exit 0
            fi
            # 새 commit (메시지에 attempt 번호 표시)
            git commit -m "$COMMIT_MSG [retry $attempt]"
            OUR_COMMIT=$(git rev-parse HEAD)
            sleep $((attempt * 2))  # exponential-ish backoff
          done
          echo "❌ All 6 push attempts failed"
          exit 1

      # ===== GitHub Pages 배포 =====
      # v6.15.42: 404.html(SPA deep URL 폴백)을 항상 index.html과 동기화 — cron 빌드가
      #   stale 404.html로 deep URL 화면을 되돌리지 않게.
      - name: Sync 404.html (SPA fallback = index.html)
        run: cp index.html 404.html
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
