name: Daily News Update

# 매일 KST 06:00 (UTC 전날 21:00) 자동 실행
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      skip_enrich:
        description: "LLM enrichment 단계 건너뛰기 (API 비용 절약)"
        required: false
        default: "false"
      skip_strategy:
        description: "전략 카드 생성 건너뛰기"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Claude Code CLI
        run: |
          # Claude Code CLI 설치 (npm)
          npm install -g @anthropic-ai/claude-code || echo "Claude CLI install failed, will fall back to SDK"
          claude --version || true

      # ===== 1단계: 뉴스 수집 =====
      - name: "Step 1/4 — Fetch news"
        run: python scripts/fetch_news.py

      # ===== 2단계: 유사 뉴스 병합 =====
      - name: "Step 2/4 — Dedupe similar news"
        run: python scripts/dedupe_similar.py

      # ===== 3단계: LLM 한국어 요약·시사점 =====
      - name: "Step 3/4 — Enrich with LLM (Korean summary & insight)"
        if: github.event.inputs.skip_enrich != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENRICH_TOP_N: "40"
          ENRICH_MAX_PER_RUN: "40"
        run: python scripts/enrich_with_llm.py
        continue-on-error: true

      - name: "Step 3/4 (skipped) — Copy deduped to enriched"
        if: github.event.inputs.skip_enrich == 'true'
        run: cp data/deduped_news.json data/enriched_news.json

      # ===== 4단계: 전략 카드 자동 생성 =====
      - name: "Step 4/4 — Generate strategy cards"
        if: github.event.inputs.skip_strategy != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_strategy.py
        continue-on-error: true

      - name: "Step 4/4 (skipped) — Copy enriched to news.json"
        if: github.event.inputs.skip_strategy == 'true'
        run: |
          python -c "
          import json, os
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          with open('data/enriched_news.json') as f:
              d = json.load(f)
          d['last_updated'] = datetime.now(KST).isoformat()
          d.setdefault('strategy', [])
          with open('data/news.json', 'w', encoding='utf-8') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          "

      # ===== Git Commit =====
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit."
          fi

      # ===== GitHub Pages 배포 =====
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
