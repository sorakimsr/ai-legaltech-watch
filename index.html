<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI & Legaltech Watch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 좌측 사이드바 -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">📡</span>
        <span class="brand-name">AI Watch</span>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">핵심 업무</div>
        <a href="#" class="nav-item active" data-view="news">
          <span class="nav-icon">📰</span>
          <span>뉴스 수집 및 분석</span>
        </a>
        <a href="#" class="nav-item" data-view="legaltech">
          <span class="nav-icon">⚖️</span>
          <span>리걸테크 모니터링</span>
        </a>
        <a href="#" class="nav-item" data-view="papers">
          <span class="nav-icon">📑</span>
          <span>AI 논문 동향</span>
        </a>
        <a href="#" class="nav-item" data-view="domestic">
          <span class="nav-icon">🇰🇷</span>
          <span>국내 동향</span>
        </a>
        <a href="#" class="nav-item" data-view="strategy">
          <span class="nav-icon">🎯</span>
          <span>전략·기획 시사점</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">분석</div>
        <a href="#" class="nav-item" data-view="sources">
          <span class="nav-icon">🔗</span>
          <span>소스 현황</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <div id="last-build-info">© 2026 AI Watch</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <main class="main">
      <!-- 상단 헤더 -->
      <header class="topbar">
        <div class="topbar-title">
          <h1 id="topbar-title">AI & Legaltech Watch</h1>
        </div>
        <div class="topbar-meta" id="topbar-meta">
          <span class="status-dot"></span>
          <span id="last-updated-text">갱신 정보 로딩 중...</span>
        </div>
      </header>

      <!-- 페이지 컨텐츠 -->
      <div class="content">
        <!-- 통계 헤더 -->
        <div class="stat-row" id="stat-row">
          <!-- JS로 채워짐 -->
        </div>

        <!-- 카테고리 필터 -->
        <div class="category-bar" id="category-bar">
          <!-- JS로 채워짐 -->
        </div>

        <!-- 검색·정렬 컨트롤 -->
        <div class="controls-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="키워드 검색 (제목, 출처, 시사점)" />
          </div>
          <div class="control-group">
            <span class="control-label">정렬</span>
            <div class="btn-group">
              <button class="seg-btn active" data-sort="date">최신순</button>
              <button class="seg-btn" data-sort="score">중요도순</button>
              <button class="seg-btn" data-sort="source">출처별</button>
            </div>
          </div>
          <div class="control-group">
            <span class="control-label">기간</span>
            <select id="date-filter">
              <option value="all">전체 기간</option>
              <option value="today">오늘</option>
              <option value="3days">최근 3일</option>
              <option value="week">최근 1주일</option>
              <option value="month">최근 1개월</option>
            </select>
          </div>
          <div class="control-group">
            <span class="control-label">언어</span>
            <select id="lang-filter">
              <option value="all">전체</option>
              <option value="ko">한국어</option>
              <option value="en">영문</option>
            </select>
          </div>
        </div>

        <!-- 뉴스 카드 그리드 -->
        <div class="news-grid" id="news-grid">
          <!-- JS로 채워짐 -->
        </div>

        <!-- 전략 시사점 섹션 -->
        <div id="strategy-view" class="strategy-view hidden">
          <div id="strategy-cards"></div>
        </div>

        <!-- 소스 현황 섹션 -->
        <div id="sources-view" class="sources-view hidden">
          <div id="sources-table"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
