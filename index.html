<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI & Legaltech Watch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 좌측 사이드바: 관점·뷰 -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">📡</span>
        <span class="brand-name">AI Watch</span>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">관점 · 뷰</div>
        <a href="#" class="nav-item active" data-view="latest">
          <span class="nav-icon">🕒</span>
          <span>최신순 뉴스</span>
        </a>
        <a href="#" class="nav-item" data-view="top">
          <span class="nav-icon">⭐</span>
          <span>중요도 TOP</span>
        </a>
        <a href="#" class="nav-item" data-view="insights">
          <span class="nav-icon">💡</span>
          <span>시사점 있는 항목</span>
        </a>
        <a href="#" class="nav-item" data-view="today">
          <span class="nav-icon">📅</span>
          <span>오늘 추가됨</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">분석</div>
        <a href="#" class="nav-item" data-view="strategy">
          <span class="nav-icon">🎯</span>
          <span>전략·기획 시사점</span>
        </a>
        <a href="#" class="nav-item" data-view="sources">
          <span class="nav-icon">🔗</span>
          <span>소스 현황</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <div id="last-build-info">© 2026 AI Watch</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <h1 id="topbar-title">AI & Legaltech Watch</h1>
          <span class="view-hint" id="view-hint">최근 30일, 점수+날짜 정렬</span>
        </div>
        <div class="topbar-meta" id="topbar-meta">
          <span class="status-dot"></span>
          <span id="last-updated-text">갱신 정보 로딩 중...</span>
        </div>
      </header>

      <div class="content">
        <div class="stat-row" id="stat-row"></div>

        <!-- 카테고리 필터 = 주제 -->
        <div class="filter-label">주제별 필터</div>
        <div class="category-bar" id="category-bar"></div>

        <div class="controls-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="키워드 검색 (제목, 출처, 요약, 시사점)" />
          </div>
          <div class="control-group">
            <span class="control-label">기간</span>
            <select id="date-filter">
              <option value="all">전체 기간</option>
              <option value="today">오늘</option>
              <option value="3days">최근 3일</option>
              <option value="week">최근 1주일</option>
              <option value="month">최근 1개월</option>
            </select>
          </div>
          <div class="control-group">
            <span class="control-label">언어</span>
            <select id="lang-filter">
              <option value="all">전체</option>
              <option value="ko">한국어</option>
              <option value="en">영문</option>
            </select>
          </div>
        </div>

        <div class="news-grid" id="news-grid"></div>

        <div id="strategy-view" class="strategy-view hidden">
          <div id="strategy-cards"></div>
        </div>

        <div id="sources-view" class="sources-view hidden">
          <div id="sources-table"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
