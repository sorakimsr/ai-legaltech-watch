<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI & Legaltech Watch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 좌측 사이드바: 관점·뷰 -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">📡</span>
        <span class="brand-name">AI Watch</span>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">관점 · 뷰</div>

        <!-- 시사점 (expandable) -->
        <div class="nav-group" data-group="strategy">
          <a href="#" class="nav-item nav-parent" data-view="strategy" data-period="daily">
            <span class="nav-icon">🎯</span>
            <span class="nav-label">전략·기획 시사점</span>
            <span class="nav-toggle">▾</span>
          </a>
          <div class="nav-children" data-children-of="strategy">
            <a href="#" class="nav-sub active" data-view="strategy" data-period="daily">
              <span class="nav-sub-bullet">·</span> Daily
            </a>
            <a href="#" class="nav-sub" data-view="strategy" data-period="weekly">
              <span class="nav-sub-bullet">·</span> Weekly
            </a>
            <a href="#" class="nav-sub" data-view="strategy" data-period="monthly">
              <span class="nav-sub-bullet">·</span> Monthly
            </a>
          </div>
        </div>

        <a href="#" class="nav-item" data-view="top">
          <span class="nav-icon">⭐</span>
          <span class="nav-label">중요도 TOP</span>
        </a>
        <a href="#" class="nav-item" data-view="today">
          <span class="nav-icon">📅</span>
          <span class="nav-label">오늘 추가됨</span>
        </a>
        <a href="#" class="nav-item active" data-view="latest">
          <span class="nav-icon">🕒</span>
          <span class="nav-label">최신순</span>
        </a>

        <!-- 소스 현황 (expandable) -->
        <div class="nav-group" data-group="sources">
          <a href="#" class="nav-item nav-parent" data-view="sources" data-tab="status">
            <span class="nav-icon">🔗</span>
            <span class="nav-label">소스 현황</span>
            <span class="nav-toggle">▾</span>
          </a>
          <div class="nav-children" data-children-of="sources">
            <a href="#" class="nav-sub active" data-view="sources" data-tab="status">
              <span class="nav-sub-bullet">·</span> 현재 상태
            </a>
            <a href="#" class="nav-sub" data-view="sources" data-tab="trend">
              <span class="nav-sub-bullet">·</span> 7일 추이
            </a>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div id="last-build-info">© 2026 AI Watch</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <h1 id="topbar-title">AI & Legaltech Watch</h1>
          <span class="view-hint" id="view-hint">최근 30일, 점수+날짜 정렬</span>
        </div>
        <div class="topbar-meta" id="topbar-meta">
          <span class="status-dot"></span>
          <span id="last-updated-text">갱신 정보 로딩 중...</span>
        </div>
      </header>

      <div class="content">
        <div class="stat-row" id="stat-row"></div>

        <!-- 카테고리 필터 = 주제 -->
        <div class="filter-label">주제별 필터</div>
        <div class="category-bar" id="category-bar"></div>

        <div class="controls-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="키워드 검색 (제목, 출처, 요약, 시사점)" />
          </div>
          <div class="control-group">
            <span class="control-label">기간</span>
            <select id="date-filter">
              <option value="all">전체 기간</option>
              <option value="today">오늘</option>
              <option value="3days">최근 3일</option>
              <option value="week">최근 1주일</option>
              <option value="month">최근 1개월</option>
            </select>
          </div>
          <div class="control-group">
            <span class="control-label">언어</span>
            <select id="lang-filter">
              <option value="all">전체</option>
              <option value="ko">한국어</option>
              <option value="en">영문</option>
            </select>
          </div>
        </div>

        <div class="news-grid" id="news-grid"></div>

        <div id="strategy-view" class="strategy-view hidden">
          <!-- period 선택 컨트롤 -->
          <div id="strategy-controls" class="strategy-controls">
            <div class="strategy-period-tabs">
              <button class="period-tab active" data-period="daily">Daily</button>
              <button class="period-tab" data-period="weekly">Weekly</button>
              <button class="period-tab" data-period="monthly">Monthly</button>
            </div>
            <select id="strategy-period-select"></select>
          </div>
          <div id="strategy-cards"></div>
        </div>

        <div id="sources-view" class="sources-view hidden">
          <div id="sources-tab-status">
            <div id="sources-table"></div>
          </div>
          <div id="sources-tab-trend" class="hidden">
            <div class="chart-wrap">
              <h3>최근 7일 소스별 수집 추이</h3>
              <div class="chart-canvas-wrap"><canvas id="trend-chart"></canvas></div>
              <div id="trend-legend" class="trend-legend"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
